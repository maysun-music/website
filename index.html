<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAYSUN</title>
  <link rel="stylesheet" href="styles/global.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: rgb(26, 1, 79);
      position: relative;
      z-index: 0;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    #site-header {
      padding: 48px 40px 36px;
      max-width: 1000px;
      margin: 0;
    }

    #site-name {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: bold;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      line-height: 1;
      color: #00eeff
    }

    #site-nav {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .nav-item {
      font-size: 13px;
      color: #00eeff;
      letter-spacing: 0.04em;
    }

    /* FILTER behavior */
    .nav-item.filter {
      cursor: pointer;
    }

    .nav-item.filter {
      padding: 2px 6px;
      /* always present */
    }

    .nav-item.filter:hover {
      background: #ee00ff;
      color: rgb(26, 1, 79);
    }

    .nav-item.filter.active {
      background: #ee00ff;
      color: rgb(26, 1, 79);
    }

    /* LINK behavior */
    .nav-item.link {
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-item.link:hover {
      color: #ee00ff;
    }

    /* ── SEARCH ───────────────────────────────────────────── */
    #search-section {
      max-width: 1000px;
      margin: 0;
      padding: 0 40px 32px;
      border-bottom: 0.5px solid #00f7ff;
    }

    #search-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #ee00ff;
      font-family: Helvetica, Arial, sans-serif;
      font-size: clamp(16px, 3vw, 24px);
      padding: 6px 0;
      outline: none;
      background: transparent;
      color: #ee00ff;
      letter-spacing: 0.01em;
      transition: border-color 0.2s;
    }

    #search-input:focus {
      border-bottom-color: #ee00ff;
    }

    #search-input::placeholder {
      color: #ee00ff;
    }

    /* ------- MAP --------- */
    #mini-map {
      position: fixed;
      top: 55px;
      right: 40px;

      display: grid;
      grid-template-columns: repeat(20, 8px);
      gap: 2px;

      opacity: 0.6;
      z-index: 10;
    }

    .mini-square {
      width: 8px;
      height: 8px;
      background: #00eeff33;
    }

    .mini-square.active {
      background: white;
    }

    .mini-square.related {
      background: yellow;
    }

    /* ------ RIGHT SIDE PANEL ---- */

    #info-panel {
      position: fixed;
      top: 140px;
      right: 40px;
      width: 320px;
      max-height: calc(100vh - 180px);
      overflow-y: auto;

      color: #00eeff;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 12px;
      line-height: 1.5;

      z-index: 999;
      background: rgb(26, 1, 79);
      padding: 0 12px;

    }

    #info-content {
      opacity: 1;
      transition: opacity 8s ease;
    }

    #info-panel h2 {
      color: #ee00ff;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #info-panel .info-meta {
      color: #bbb;
      font-size: 11px;
      margin-bottom: 14px;
    }

    #info-panel p {
      margin-bottom: 1em;
    }

    /* ── ITEMS ────────────────────────────────────────────── */
    #items-wrap {
      max-width: calc(100vw - 420px);
      margin-right: 360px;
      margin: 0;
      padding: 36px 40px 60px;
    }

    #items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 36px;
    }

    .grid-item {
      cursor: pointer;
      transition: opacity 1s ease-in, filter 1s ease-in;
    }

    .grid-item-image-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.07);
      position: relative;
      background: #000000;
    }

    .grid-item-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      transition: filter 0.2s, opacity 0.2s;
    }

    .grid-item-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .grid-item:hover .grid-item-overlay {
      opacity: 0.9;
      background: black;
    }

    .grid-item:hover .grid-item-image {
      filter: contrast(1.15) saturate(0.9);
      transform: scale(1.02);
    }

    .grid-item-overlay-text {

      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.6;
      color: #00eeff;
    }

    .grid-item-title {
      font-weight: bold;
      font-size: 0.88rem;
      margin-top: 10px;
      margin-bottom: 3px;
      color: #ee00ff;
    }

    .grid-item-type {
      font-size: 0.75rem;
      color: #bbb;
      margin-bottom: 7px;
    }

    .grid-item-placeholder {
      width: 100%;
      height: 100%;
      padding: 12px;

      display: -webkit-box;
      -webkit-line-clamp: 8;
      /* adjust lines here */
      -webkit-box-orient: vertical;

      font-size: 10px;
      line-height: 1.4;
      color: #00eeff;

      background: black;
      opacity: 0.9;

      overflow: hidden;
    }

    .no-results {
      font-size: 13px;
      color: #bbb;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    #site-footer {
      max-width: 1000px;
      margin: 0;
      padding: 24px 40px 48px;
      border-top: 0.5px solid #00eeff;
      display: flex;
      gap: 24px;
    }

    #site-footer a {
      font-size: 12px;
      color: #00eeff;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    #site-footer a:hover {
      color: #ee00ff;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid-item {
      animation: fadeUp 0.2s ease forwards;
    }

    #last-update {
      font-size: 12px;
      color: #555;
      /* dark gray */
      margin-left: auto;
      opacity: 0.5;
    }

    /* ── MOBILE ───────────────────────────────────────────── */
    @media (max-width: 640px) {

      #site-header,
      #search-section,
      #items-wrap,
      #site-footer {
        padding-left: 20px;
        padding-right: 20px;
      }

      #site-header {
        padding-top: 32px;
      }

      #items-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
      }

      #mini-map,
      #info-panel {
        display: none;
      }

      #items-wrap {
        max-width: 100%;
      }

    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header id="site-header">
    <div id="site-name">MAYSUN</div>
    <nav id="site-nav">
      <span class="nav-item filter" data-section="story">forever in sound</span>
      <span class="nav-item filter" data-section="albums">music</span>
      <span class="nav-item filter" data-section="fabrication">fabrication</span>

      <a class="nav-item link" href="activities.html">shows</a>
      <a class="nav-item link" href="contact.html">contact</a>
    </nav>
  </header>

  <!-- SEARCH -->
  <div id="search-section">
    <input type="text" id="search-input" placeholder="filter by:" autocomplete="off" spellcheck="false" />

    <!-- ITEMS -->
    <div id="items-wrap">
      <div id="items-grid"></div>
    </div>

    <div id="mini-map"></div>
    <aside id="info-panel">
      <div id="info-content"></div>
    </aside>

    <!-- FOOTER -->
    <footer id="site-footer">
      <a href="https://www.instagram.com/maysun.music/" target="_blank">instagram</a>
      <a href="https://maysunmusic.bandcamp.com/" target="_blank">bandcamp</a>
      <a href="https://www.youtube.com/@MAYSUNmusic" target="_blank">youtube</a>
      <a href="contact.html">contact</a>
      <span id="last-update"></span>
    </footer>

    <script>
      let miniMap = new Map();
      let allItems = [];
      let biographyData = null;
      let bioTimeout = null;
      let activeSection = null;

      Promise.all([
        fetch('data/diy_makes.json').then(r => r.json()),
        fetch('data/albums.json').then(r => r.json()),
        fetch('data/spatial_templates.json').then(r => r.json()),
        fetch('data/forever.json').then(r => r.json()),
        fetch('data/installations.json').then(r => r.json()),
        fetch('data/biography.json').then(r => r.json())
      ]).then(([diy, albums, spatial, forever, installations, biography]) => {
        biographyData = biography;
        allItems = [...diy, ...albums, ...spatial, ...forever, ...installations]
          .sort((a, b) => Number(b.year) - Number(a.year));
        renderDefaultInfo();
        renderItems(allItems, '');
      });

      document.getElementById('search-input').addEventListener('input', function () {
        const q = this.value.trim().toLowerCase();
        if (q) {
          activeSection = null;
          document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
        }
        const filtered = q ? allItems.filter(item => matches(item, q)) : allItems;
        renderItems(filtered, q);
      });

      document.querySelectorAll('.nav-item.filter').forEach(el => {
        el.addEventListener('click', () => {
          if (!allItems.length) return;
          const section = el.dataset.section;

          if (activeSection === section) {
            activeSection = null;
            document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
            renderItems(allItems, '');
          } else {
            activeSection = section;

            document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
            el.classList.add('active');

            let filtered = allItems.filter(item => item.section === section);

            if (section === 'story') {
              filtered = filtered.sort((a, b) => a.title.localeCompare(b.title));
            }

            renderItems(filtered, '');
          }

          document.getElementById('search-input').value = '';
        });
      });

      function matches(item, q) {
        const haystack = [
          item.title || '',
          item.type || '',
          item.year || '',
          item.description || '',
          item.short_description || '',
          item.back_story || '',
          item.future || '',
          (item.tags || []).join(' '),
          (item.components || []).join(' '),
          (item.components_tx || []).join(' '),
          (item.components_rx || []).join(' ')
        ].join(' ').toLowerCase();

        return haystack.includes(q);
      }

      function isRelated(a, b) {
        if (a.id === b.id) return true;

        return (a.relations || []).includes(b.id) ||
          (b.relations || []).includes(a.id);
      }

      function getPreviewText(item) {
        const text = (item.description || item.short_description || '').trim();

        // first line only
        const firstLine = text.split('\n')[0];

        // limit length
        return firstLine.length > 80
          ? firstLine.slice(0, 80) + '...'
          : firstLine;
      }

      function getForeverPreview(item) {
        const text = (item.description || '').trim();

        return text.length > 200
          ? text.slice(0, 200) + '...'
          : text;
      }

      function escapeHTML(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function renderDefaultInfo() {
        const panel = document.getElementById('info-content');
        if (!panel || !biographyData) return;

        const bio = (biographyData.bio || [])
          .map(p => `<p>${escapeHTML(p)}</p>`)
          .join('');

        const statement = (biographyData.statement || [])
          .map(p => `<p>${escapeHTML(p)}</p>`)
          .join('');

        panel.innerHTML = `
  <h2>BIOGRAPHY</h2>
  ${bio}
  <h2>ARTIST STATEMENT</h2>
  ${statement}
`;
      }

      function renderItemInfo(item) {
        const panel = document.getElementById('info-content');
        if (!panel) return;

        const text = item.short_description || item.description || item.back_story || '';
        const cleanText = escapeHTML(text).replace(/\n/g, '<br>');

        panel.innerHTML = `
  <h2>${escapeHTML(item.title || '')}</h2>
  <div class="info-meta">${escapeHTML(item.type || '')}${item.year ? ' · ' + escapeHTML(item.year) : ''}</div>
  <p>${cleanText}</p>
`;
      }

      function renderItems(items, q) {
        const meta = document.getElementById('search-meta');
        const grid = document.getElementById('items-grid');
        grid.innerHTML = '';

        if (meta) {
          meta.textContent = q
            ? (items.length ? items.length + ' result' + (items.length !== 1 ? 's' : '') : '')
            : '';
        }

        const mini = document.getElementById('mini-map');
        mini.innerHTML = '';
        miniMap.clear();

        if (items.length === 0) {
          grid.innerHTML = '<div class="no-results">nothing found for "' + q + '"</div>';
          return;
        }

        items.forEach((item, idx) => {

          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = item.short_description || '';
          const text = (tempDiv.textContent || '').trim();
          const preview = text.length > 80 ? text.slice(0, 80) + '...' : text;

          const el = document.createElement('div');
          el.className = 'grid-item';
          el.dataset.id = item.id;
          el.style.animationDelay = (idx * 30) + 'ms';

          el.innerHTML = `
  <div class="grid-item-image-container">
    ${item.main_image
              ? `<img class="grid-item-image" src="${item.main_image}" alt="${item.title}" loading="lazy">`
              : `<div class="grid-item-placeholder">${item.type === "forever in sound"
                ? getForeverPreview(item)
                : getPreviewText(item)
              }</div>`
            }
      <div class="grid-item-overlay">
        <span class="grid-item-overlay-text">${(item.tags || []).slice(0, 5).join(' · ')}</span>
      </div>
          </div>
          <div class="grid-item-title">${item.title}</div>
          <div class="grid-item-type">${item.type} · ${item.year}</div>
        `;

          const goTo = () => {
            if (!item.url) return;

            window.location.href = item.url;
          };

          el.addEventListener('click', goTo);
          grid.appendChild(el);

          const sq = document.createElement('div');
          sq.className = 'mini-square';
          miniMap.set(item.id, sq);
          mini.appendChild(sq);

          el.addEventListener('mouseenter', () => {
            const panel = document.getElementById('info-content');

            // CANCEL pending bio fade
            if (bioTimeout) {
              clearTimeout(bioTimeout);
              bioTimeout = null;
            }

            panel.style.transition = 'none';
            panel.style.opacity = 1;

            renderItemInfo(item);

            miniMap.forEach(sq => {
              sq.classList.remove('active', 'related');
            });

            miniMap.get(item.id)?.classList.add('active');

            (item.relations || []).forEach(id => {
              miniMap.get(id)?.classList.add('related');
            });
          });

          el.addEventListener('mouseleave', () => {
            const panel = document.getElementById('info-content');

            panel.style.transition = 'opacity 0.15s ease';
            panel.style.opacity = 0;

            bioTimeout = setTimeout(() => {
              renderDefaultInfo();

              panel.style.transition = 'opacity 8s ease';
              panel.style.opacity = 1;

              bioTimeout = null;
            }, 150);
          });

        });
      }
      function getRelated(item) {
        const scores = {};
        allItems.forEach(other => {
          if (other.id === item.id) return;
          let score = 0;
          if ((item.relations || []).includes(other.id)) score += 10;
          if ((other.relations || []).includes(item.id)) score += 10;
          const shared = (item.tags || []).filter(t => (other.tags || []).includes(t));
          score += shared.length;
          if (score > 0) scores[other.id] = { item: other, score };
        });
        return Object.values(scores)
          .sort((a, b) => b.score - a.score)
          .slice(0, 3)
          .map(s => s.item);
      }

      fetch('https://api.github.com/repos/maysun-music/website/commits?per_page=1')
        .then(res => res.json())
        .then(data => {
          const date = new Date(data[0].commit.author.date);

          const mm = String(date.getMonth() + 1).padStart(2, '0');
          const dd = String(date.getDate()).padStart(2, '0');
          const yy = String(date.getFullYear()).slice(-2);

          const hh = String(date.getHours()).padStart(2, '0');
          const min = String(date.getMinutes()).padStart(2, '0');

          document.getElementById('last-update').textContent =
            `last update: ${mm}/${dd}/${yy} - ${hh}:${min}`;
        })
        .catch(() => {
          document.getElementById('last-update').textContent = '';
        });
    </script>

</body>

</html>
