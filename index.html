<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAYSUN</title>
  <link rel="stylesheet" href="styles/global.css" />

  <style>
    :root {
      /* DEFAULT = ELECTRIC */
      --color-bg: rgb(26, 1, 79);
      --color-main: #00f7ff;
      --color-accent: #ee00ff;

      --panel-width: 320px;
      --panel-gap: 40px;
    }

    /* MATERIAL MODE */
    body.material-mode {
      --color-bg: #e8e6e1;
      --color-main: #1a1a1a;
      --color-accent: #5b8cff;
    }

    body,
    #sticky-top,
    #info-panel,
    #overlay-panel {
      transition: background-color 3.5s ease;
    }

    #site-name,
    .nav-item,
    #search-input,
    #info-panel,
    #overlay-panel,
    .grid-item-title,
    .grid-item-overlay-text,
    #site-footer a {
      transition: color 3.5s ease, border-color 3.5s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-bg);
      position: relative;
      z-index: 0;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    #site-header {
      padding: 48px 40px 36px;
      max-width: 1000px;
      margin: 0;
    }

    #site-name {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: bold;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      line-height: 1;
      color: var(--color-main)
    }

    #site-nav {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .nav-item {
      font-size: 13px;
      color: var(--color-main);
      letter-spacing: 0.04em;
    }

    /* FILTER behavior */
    .nav-item.filter {
      cursor: pointer;
    }

    .nav-item.filter {
      padding: 2px 6px;
      /* always present */
    }

    .nav-item.filter:hover {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    .nav-item.filter.active {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    /* LINK behavior */
    .nav-item.link {
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-item.link:hover {
      color: var(--color-accent);
    }

    #bio-burger {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 28px;
      color: var(--color-main);
      opacity: 0.6;
      cursor: pointer;
      z-index: 600;
      line-height: 1;
    }

    .nav-break {
      display: none;

    }

    /* ── SEARCH ───────────────────────────────────────────── */
    #search-section {
      max-width: none;
      margin: 0;
      padding: 0 40px 6px;
      /* border-bottom: 0.5px solid var(--color-main); */
    }

    #search-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--color-accent);
      font-family: Helvetica, Arial, sans-serif;
      font-size: clamp(16px, 3vw, 24px);
      padding: 6px 0;
      outline: none;
      background: transparent;
      color: var(--color-accent);
      letter-spacing: 0.01em;
      transition: border-color 3.5s ease, color 3.5s ease;
      clip-path: inset(0 calc(var(--panel-width) + var(--panel-gap)) 0 0);
    }

    #search-input:focus {
      border-bottom-color: var(--color-accent);
    }

    #search-input::placeholder {
      color: var(--color-accent);
    }

    /* ------- MAP --------- */
    #mini-map {
      position: fixed;
      top: 48px;
      right: 40px;
      display: grid;
      grid-template-columns: repeat(20, 8px);
      gap: 2px;
      opacity: 0.6;
      z-index: 501;
    }

    .mini-square {
      width: 8px;
      height: 8px;
      background: var(--color-main)33;
    }

    .mini-square.active {
      background: white;
    }

    .mini-square.related {
      background: yellow;
    }

    /* ------ RIGHT SIDE PANEL ---- */

    #info-panel {
      position: fixed;
      top: 140px;
      right: var(--panel-gap);
      width: var(--panel-width);
      max-height: calc(100vh - 180px);
      overflow-y: auto;

      color: var(--color-main);
      font-family: Helvetica, Arial, sans-serif;
      font-size: 12px;
      line-height: 1.5;

      z-index: 999;
      background: transparent;
      padding: 0 12px;

      overflow: visible;

    }

    #info-content {
      opacity: 1;
      transition: opacity 8s ease;
    }

    #info-panel h2 {
      color: var(--color-accent);
      font-size: 18px;
      margin-bottom: 10px;
    }

    #info-panel .info-meta {
      color: #bbb;
      font-size: 11px;
      margin-bottom: 14px;
    }

    #info-panel p {
      margin-bottom: 1em;
    }

    .glitch-char {
      display: inline-block;
      position: relative;
      transition: transform 0.6s linear, opacity 1.2s ease;
      transform: translate(var(--dx, 0px)) translateY(var(--dy, 0px));
      white-space: pre;
    }

    p {
      word-break: keep-all;
    }

    #info-scroll {
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }

    /* ── ITEMS ────────────────────────────────────────────── */
    #items-wrap {
      max-width: calc(100vw - 420px);
      margin-right: 360px;
      margin: 0;
      padding: 36px 40px 60px;
    }

    #items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 36px;
    }

    .grid-item {
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .grid-item-image-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.07);
      position: relative;
      background-color: var(--color-bg);
    }

    .grid-item-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      transition: filter 0.2s, opacity 0.2s;
    }

    .grid-item-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .grid-item:hover .grid-item-overlay {
      opacity: 0.9;
      background: black;
    }

    .grid-item:hover .grid-item-image {
      filter: contrast(1.15) saturate(0.9);
      transform: scale(1.02);
    }

    .grid-item-overlay-text {

      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.6;
      color: var(--color-main);
    }

    .grid-item-title {
      font-weight: bold;
      font-size: 0.88rem;
      margin-top: 10px;
      margin-bottom: 3px;
      color: var(--color-accent);
    }

    .grid-item-type {
      font-size: 0.75rem;
      color: #bbb;
      margin-bottom: 7px;
    }

    .grid-item-placeholder {
      width: 100%;
      height: 100%;
      padding: 12px;

      display: -webkit-box;
      -webkit-line-clamp: 8;
      /* adjust lines here */
      -webkit-box-orient: vertical;

      font-size: 10px;
      line-height: 1.4;
      color: var(--color-main);

      background: black;
      opacity: 0.9;

      overflow: hidden;
    }

    .no-results {
      font-size: 13px;
      color: #bbb;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    #site-footer {
      max-width: 1000px;
      margin: 0;
      padding: 24px 40px 48px;
      border-top: 0.5px solid var(--color-main);
      display: flex;
      gap: 24px;
    }

    #site-footer a {
      font-size: 12px;
      color: var(--color-main);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    #site-footer a:hover {
      color: var(--color-accent);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #last-update {
      font-size: 12px;
      color: #555;
      /* dark gray */
      margin-left: auto;
      opacity: 0.5;
    }

    /* ── STICKY TOP ──────────────────────────────────────── */
    #sticky-top {
      position: sticky;
      top: 0;
      z-index: 500;
      background-color: var(--color-bg);
    }

    @media (max-width: 1000px) {
      body::before {
        display: none;
      }
    }

    /* ── MOBILE ───────────────────────────────────────────── */

    @media (max-width: 640px) {

      #site-name {
        text-align: center;
        width: 100%;
      }

      body::before {
        display: none;
      }

      #site-header {
        padding: 20px 20px 16px 20px;
      }

      #site-name {
        padding-left: 0;
        margin-bottom: 10px;
      }

      #site-nav {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px 16px;
        justify-content: start;
      }

      /* force exact rows */
      .nav-item:nth-child(1),
      .nav-item:nth-child(2),
      .nav-item:nth-child(3),
      .nav-item:nth-child(4) {
        grid-row: 1;
      }

      .nav-item:nth-child(6),
      .nav-item:nth-child(7) {
        grid-row: 2;
      }

      /* burger stays top right */

      #bio-burger {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      .nav-item {
        font-size: 16px;
        text-align: center;
      }

      .nav-item.filter,
      .nav-item.link {
        flex-basis: auto;
      }

      /* FIX */
      .nav-break {
        display: block;
        width: 100%;
      }

      #bio-burger {
        display: block;
      }

      #search-input {
        clip-path: none;
      }

      #search-section {
        padding: 0 20px 20px;
      }

      #items-wrap {
        max-width: 100%;
        padding: 20px 20px 40px;
      }

      #items-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .grid-item-image-container {
        height: 120px;
      }

      .grid-item-title {
        font-size: 0.75rem;
      }

      .grid-item-type {
        font-size: 0.65rem;
      }

      .grid-item:active .grid-item-image-container {
        opacity: 0.7;
      }

      #mini-map,
      #info-panel {
        display: none;
      }

      #site-footer {
        padding: 20px 20px 36px;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        text-align: center;
      }

      #last-update {
        width: 100%;
        margin-left: 0;
        text-align: center;
      }

      #overlay-close {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 2002;
        background-color: var(--color-bg);
        padding: 4px 8px;
        opacity: 0.8;
      }

      #overlay-panel {
        padding: 48px 24px 32px;
        max-height: 90vh;
      }
    }


    /* ── OVERLAY ─────────────────────────────────────────── */
    #overlay-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 40, 0.85);
      z-index: 2000;
      cursor: pointer;
    }

    #overlay-backdrop.visible {
      display: block;
    }

    #overlay-panel {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      max-width: 94vw;
      max-height: 85vh;
      overflow-y: auto;
      background-color: var(--color-bg);
      border: 0.5px solid var(--color-main);
      padding: 48px;
      z-index: 2001;
      cursor: default;
    }

    #overlay-panel h2 {
      font-size: 28px;
      font-weight: bold;
      color: var(--color-main);
      margin-bottom: 16px;
    }

    #overlay-panel p {
      font-size: 13px;
      color: var(--color-main);
      line-height: 1.6;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    #overlay-panel a {
      color: var(--color-main);
      text-decoration: none;
    }

    #overlay-panel a:hover {
      text-decoration: underline;
    }

    .overlay-icons {
      display: flex;
      gap: 20px;
      margin-top: 24px;
    }

    .overlay-icons a img {
      width: 22px;
      height: 22px;
      opacity: 0.6;
      transition: opacity 0.15s;
      filter: invert(1);
    }

    .overlay-icons a:hover img {
      opacity: 1;
    }

    #overlay-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 28px;
      font-weight: bold;
      color: var(--color-main);
      opacity: 0.6;
      cursor: pointer;
      z-index: 2002;
      display: none;
      line-height: 1;
    }

    #overlay-close:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div id="sticky-top">
    <!-- HEADER -->
    <header id="site-header">
      <div id="site-name">MAYSUN</div>
      <span id="bio-burger" onclick="openOverlay('bio')">☰</span>
      <nav id="site-nav">
        <span class="nav-item filter" data-section="story">forever in sound</span>
        <span class="nav-item filter" data-section="albums">music</span>
        <span class="nav-item filter" data-section="fabrication">fabrication</span>
        <span class="nav-item filter" data-section="resources">resources</span>
        <span class="nav-break"></span>
        <span class="nav-item link" onclick="openOverlay('shows')" style="cursor:pointer;">shows</span>
        <span class="nav-item link" onclick="openOverlay('contact')" style="cursor:pointer;">contact</span>
      </nav>
    </header>

    <!-- SEARCH -->
    <div id="search-section">
      <input type="text" id="search-input" placeholder="filter by:" autocomplete="off" spellcheck="false" />
      <div id="search-meta"
        style="font-size:11px; color:var(--color-accent); opacity:0.5; margin-top:6px; min-height:16px;"></div>
    </div>
    <div id="mini-map"></div>
  </div>
  <!-- ITEMS -->
  <div id="items-wrap">
    <div id="items-grid"></div>
  </div>


  <aside id="info-panel">
    <div id="info-scroll">
      <div id="info-content"></div>
    </div>
  </aside>

  <!-- FOOTER -->
  <footer id="site-footer">
    <a href="https://www.instagram.com/maysun.music/" target="_blank">instagram</a>
    <a href="https://maysunmusic.bandcamp.com/" target="_blank">bandcamp</a>
    <a href="https://www.youtube.com/@MAYSUNmusic" target="_blank">youtube</a>
    <a href="contact.html">contact</a>
    <span id="last-update"></span>
  </footer>

  <script>
    let miniMap = new Map();
    let allItems = [];
    let biographyData = null;
    let bioTimeout = null;
    let activeSection = null;

    Promise.all([
      fetch('data/diy_makes.json').then(r => r.json()),
      fetch('data/albums.json').then(r => r.json()),
      fetch('data/spatial_templates.json').then(r => r.json()),
      fetch('data/forever.json').then(r => r.json()),
      fetch('data/installations.json').then(r => r.json()),
      fetch('data/biography.json').then(r => r.json())
    ]).then(([diy, albums, spatial, forever, installations, biography]) => {
      biographyData = biography;
      allItems = [...diy, ...albums, ...spatial, ...forever, ...installations]
        .sort((a, b) => Number(b.year) - Number(a.year));
      renderDefaultInfo();
      renderItems(allItems, '');
    });

    document.getElementById('search-input').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      if (q) {
        activeSection = null;
        document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
      }
      const filtered = q ? allItems.filter(item => matches(item, q)) : allItems;
      renderItems(filtered, q);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.querySelectorAll('.nav-item.filter').forEach(el => {
      el.addEventListener('click', () => {
        if (!allItems.length) return;
        const section = el.dataset.section;

        if (activeSection === section) {
          activeSection = null;
          updateColorMode(null);
          document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
          renderItems(allItems, '');
        } else {
          activeSection = section;
          updateColorMode(section);

          document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));

          el.classList.add('active');

          let filtered = allItems.filter(item => item.section === section);

          if (section === 'story') {
            filtered = filtered.sort((a, b) => a.title.localeCompare(b.title));
          }

          renderItems(filtered, '');
        }

        document.getElementById('search-input').value = '';

        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    function matches(item, q) {
      const haystack = [
        item.title || '',
        item.type || '',
        item.year || '',
        item.description || '',
        item.short_description || '',
        item.back_story || '',
        item.future || '',
        (item.tags || []).join(' '),
        (item.components || []).join(' '),
        (item.components_tx || []).join(' '),
        (item.components_rx || []).join(' ')
      ].join(' ').toLowerCase();

      return haystack.includes(q);
    }

    function isRelated(a, b) {
      if (a.id === b.id) return true;

      return (a.relations || []).includes(b.id) ||
        (b.relations || []).includes(a.id);
    }

    function getPreviewText(item) {
      const text = (item.description || item.short_description || '').trim();

      // first line only
      const firstLine = text.split('\n')[0];

      // limit length
      return firstLine.length > 80
        ? firstLine.slice(0, 80) + '...'
        : firstLine;
    }

    function getForeverPreview(item) {
      const text = (item.description || '').trim();

      return text.length > 200
        ? text.slice(0, 200) + '...'
        : text;
    }

    function escapeHTML(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    //     function renderDefaultInfo() {
    //       const panel = document.getElementById('info-content');
    //       if (!panel || !biographyData) return;

    //       const bio = (biographyData.bio || [])
    //         .map(p => `<p>${escapeHTML(p)}</p>`)
    //         .join('');

    //       const statement = (biographyData.statement || [])
    //         .map(p => `<p>${escapeHTML(p)}</p>`)
    //         .join('');

    //       panel.innerHTML = `
    //   <h2>BIOGRAPHY</h2>
    //   ${bio}
    //   <h2>ARTIST STATEMENT</h2>
    //   ${statement}
    // `;
    //     }

    function renderDefaultInfo() {
      const panel = document.getElementById('info-content');
      if (!panel || !biographyData) return;

      panel.innerHTML = ''; // clear

      const bioTitle = document.createElement('h2');
      bioTitle.textContent = 'BIOGRAPHY';
      panel.appendChild(bioTitle);

      biographyData.bio.forEach(text => {
        panel.appendChild(createGlitchParagraph(text));
      });

      const statementTitle = document.createElement('h2');
      statementTitle.textContent = 'ARTIST STATEMENT';
      panel.appendChild(statementTitle);

      biographyData.statement.forEach(text => {
        panel.appendChild(createGlitchParagraph(text));
      });

      if (!panel._glitchBound) {
        enableBioGlitch(panel);
        panel._glitchBound = true;
      }
    }

    function createGlitchParagraph(text) {
      const p = document.createElement('p');

      text.split(' ').forEach((word, i) => {
        const wordSpan = document.createElement('span');
        wordSpan.style.whiteSpace = 'nowrap';

        word.split('').forEach(char => {
          const span = document.createElement('span');
          span.className = 'glitch-char';
          span.innerHTML = char === ' ' ? '&nbsp;' : char;
          wordSpan.appendChild(span);
        });

        p.appendChild(wordSpan);

        // add space between words
        if (i < text.split(' ').length - 1) {
          p.appendChild(document.createTextNode(' '));
        }
      });

      return p;
    }

    function glitchCharacter(el, mouseX, mouseY) {
      const rect = el.getBoundingClientRect();

      const dx = (rect.left + rect.width / 2) - mouseX;
      const dy = (rect.top + rect.height / 2) - mouseY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      const RADIUS = 2000;
      if (distance > RADIUS) return;

      const proximity = 1 - distance / RADIUS;

      // ---- ORIGINAL LETTER FADES (does NOT move) ----
      clearTimeout(el._fadeTimeout);

      // map proximity → opacity (never fully gone)
      const minOpacity = 0.35; // lowest visible
      const targetOpacity = minOpacity + (1 - proximity) * (1 - minOpacity);

      // immediate drop (no transition)
      el.style.transition = 'none';
      el.style.opacity = targetOpacity;

      // smooth return to full
      el._fadeTimeout = setTimeout(() => {
        el.style.transition = 'opacity 12s ease';
        el.style.opacity = 1;
      }, 320 + Math.random() * 1000);

      // ---- GHOST CLONE ----
      const clone = el.cloneNode(true);

      clone.style.position = 'fixed'; // IMPORTANT: stable positioning
      clone.style.left = rect.left + 'px';
      clone.style.top = rect.top + 'px';
      clone.style.pointerEvents = 'none';
      clone.style.margin = 0;

      const color = getComputedStyle(el).color;
      clone.style.color = color;

      const cs = getComputedStyle(el);

      clone.style.fontSize = cs.fontSize;
      clone.style.fontFamily = cs.fontFamily;
      clone.style.fontWeight = cs.fontWeight;
      clone.style.letterSpacing = cs.letterSpacing;
      clone.style.lineHeight = cs.lineHeight;

      clone.style.zIndex = 2000;

      // random scatter (NOT directional)
      const scatterX = (Math.random() - 0.5) * 200 * proximity;
      const scatterY = (Math.random() - 0.5) * 300 * proximity;

      clone.style.transform = `translate(${scatterX}px, ${scatterY}px)`;

      // random opacity for texture
      clone.style.opacity = 0.05 + Math.random() * 0.3;

      const duration = 4 + Math.random() * 6;
      clone.style.transition = `opacity ${duration}s ease`;

      document.body.appendChild(clone);

      // fade OUT clone
      requestAnimationFrame(() => {
        clone.style.opacity = 0;
      });

      // cleanup
      setTimeout(() => {
        clone.remove();
      }, duration * 4000);
    }

    function enableBioGlitch(container) {
      container.addEventListener('mousemove', (e) => {
        if (!container.contains(e.target)) return;
        const el = e.target;
        if (!el.classList.contains('glitch-char')) return;

        const chars = el.parentElement.querySelectorAll('.glitch-char');

        const index = Array.from(chars).indexOf(el);

        for (let i = index - 4; i <= index + 4; i++) {
          if (chars[i]) {
            glitchCharacter(chars[i], e.clientX, e.clientY);
          }
        }
      });
    }

    function renderItemInfo(item) {
      const panel = document.getElementById('info-content');
      if (!panel) return;

      const text = item.short_description || item.description || item.back_story || '';
      const cleanText = escapeHTML(text).replace(/\n/g, '<br>');

      panel.innerHTML = `
  <h2>${escapeHTML(item.title || '')}</h2>
  <div class="info-meta">${escapeHTML(item.type || '')}${item.year ? ' · ' + escapeHTML(item.year) : ''}</div>
  <p>${cleanText}</p>
`;
    }

    function renderItems(items, q) {
      const meta = document.getElementById('search-meta');
      const grid = document.getElementById('items-grid');
      grid.innerHTML = '';

      if (meta) {
        meta.textContent = q
          ? (items.length ? items.length + ' result' + (items.length !== 1 ? 's' : '') : '')
          : '';
      }

      const mini = document.getElementById('mini-map');
      mini.innerHTML = '';
      miniMap.clear();

      if (items.length === 0) {
        grid.innerHTML = '<div class="no-results">nothing found for "' + q + '"</div>';
        return;
      }

      items.forEach((item, idx) => {

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = item.short_description || '';
        const text = (tempDiv.textContent || '').trim();
        const preview = text.length > 80 ? text.slice(0, 80) + '...' : text;

        const el = document.createElement('div');
        el.className = 'grid-item';
        el.dataset.id = item.id;
        const randomDelay = (0.5 + Math.random() * 2).toFixed(2); // RNDM DELAY
        el.style.opacity = '0';
        el.style.animation = `fadeIn ${(0.8 + Math.random() * 1.2).toFixed(2)}s ease forwards`;
        el.style.animationDelay = randomDelay + 's';

        el.innerHTML = `
  <div class="grid-item-image-container">
    ${item.main_image
            ? `<img class="grid-item-image" src="${item.main_image}" alt="${item.title}" loading="lazy">`
            : `<div class="grid-item-placeholder">${item.type === "forever in sound"
              ? getForeverPreview(item)
              : getPreviewText(item)
            }</div>`
          }
      <div class="grid-item-overlay">
        <span class="grid-item-overlay-text">${(item.tags || []).slice(0, 5).join(' · ')}</span>
      </div>
          </div>
          <div class="grid-item-title">${item.title}</div>
          <div class="grid-item-type">${item.type} · ${item.year}</div>
        `;

        const goTo = () => {
          if (!item.url) return;

          window.location.href = item.url;
        };

        el.addEventListener('click', goTo);
        grid.appendChild(el);

        const sq = document.createElement('div');
        sq.className = 'mini-square';
        miniMap.set(item.id, sq);
        mini.appendChild(sq);

        el.addEventListener('mouseenter', () => {
          const panel = document.getElementById('info-content');

          // CANCEL pending bio fade
          if (bioTimeout) {
            clearTimeout(bioTimeout);
            bioTimeout = null;
          }

          panel.style.transition = 'none';
          panel.style.opacity = 1;

          renderItemInfo(item);

          miniMap.forEach(sq => {
            sq.classList.remove('active', 'related');
          });

          miniMap.get(item.id)?.classList.add('active');

          (item.relations || []).forEach(id => {
            miniMap.get(id)?.classList.add('related');
          });
        });

        el.addEventListener('mouseleave', () => {
          const panel = document.getElementById('info-content');

          panel.style.transition = 'opacity 0.15s ease';
          panel.style.opacity = 0;

          bioTimeout = setTimeout(() => {
            renderDefaultInfo();

            panel.style.transition = 'opacity 8s ease';
            panel.style.opacity = 1;

            bioTimeout = null;
          }, 150);
        });

      });
    }
    function getRelated(item) {
      const scores = {};
      allItems.forEach(other => {
        if (other.id === item.id) return;
        let score = 0;
        if ((item.relations || []).includes(other.id)) score += 10;
        if ((other.relations || []).includes(item.id)) score += 10;
        const shared = (item.tags || []).filter(t => (other.tags || []).includes(t));
        score += shared.length;
        if (score > 0) scores[other.id] = { item: other, score };
      });
      return Object.values(scores)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3)
        .map(s => s.item);
    }

    fetch('https://api.github.com/repos/maysun-music/website/commits?per_page=1')
      .then(res => res.json())
      .then(data => {
        const date = new Date(data[0].commit.author.date);

        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        const yy = String(date.getFullYear()).slice(-2);

        const hh = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');

        document.getElementById('last-update').textContent =
          `last update: ${mm}/${dd}/${yy} - ${hh}:${min}`;
      })
      .catch(() => {
        document.getElementById('last-update').textContent = '';
      });

    const overlayContents = {
      contact: `
    <h2>CONTACT</h2>
    <p>Collaborations, commissions, questions.</p>
    <p><a href="mailto:maysun.booking@gmail.com">maysun.booking@gmail.com</a></p>
    <div class="overlay-icons">
      <a href="https://www.instagram.com/maysun.music/" target="_blank">
        <img src="assets/images/logos/ig_logo.png" alt="Instagram">
      </a>
      <a href="https://maysunmusic.bandcamp.com/" target="_blank">
        <img src="assets/images/logos/bc_logo.png" alt="Bandcamp">
      </a>
      <a href="https://www.youtube.com/@MAYSUNmusic" target="_blank">
        <img src="assets/images/logos/yt_logo.png" alt="YouTube">
      </a>
    </div>
  `
    };

    function openOverlay(key) {
      document.getElementById('overlay-backdrop').classList.add('visible');
      document.getElementById('overlay-panel').style.display = 'block';
      document.getElementById('overlay-close').style.display = 'block';
      document.body.style.overflow = 'hidden';
      history.pushState({ overlay: key }, '', '#' + key);

      if (key === 'shows') {
        renderShowsOverlay();
      } else if (key === 'bio') {
        renderBioOverlay();
      } else {
        document.getElementById('overlay-content').innerHTML = overlayContents[key] || '';
      }

      if (key.startsWith('item/')) {
        const id = key.slice(5);
        renderItemOverlay(id);
      }
    }

    function renderShowsOverlay() {
      const content = document.getElementById('overlay-content');
      content.innerHTML = '<h2>SHOWS</h2><p style="opacity:0.4; font-size:11px;">loading...</p>';

      fetch('data/shows.json')
        .then(r => r.json())
        .then(shows => {
          const upcoming = shows.filter(s => s.type === 'upcoming');
          const past = shows.filter(s => s.type === 'past');

          function formatDate(str) {
            if (!str.match(/^\d{4}-\d{2}-\d{2}$/)) return str;
            const [y, m, d] = str.split('-');
            return new Date(y, m - 1, d)
              .toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
              .toUpperCase();
          }

          // function renderList(list) {
          //   return list.map(s => {
          //     const date = `<span style="color:#bbb; font-size:13px; min-width:130px; display:inline-block;">${formatDate(s.date)}</span>`;
          //     const collab = s.collaborators ? `<span style="color:#bbb; font-size:12px;"> ${s.collaborators}</span>` : '';
          //     const venue = `<span style="font-size:12px;">${s.venue}</span>${collab}`;
          //     const city = `<span style="color:#bbb; font-size:13px;"> — ${s.city}</span>`;
          //     const inner = `${venue}${city}`;
          //     const line = s.url
          //       ? `<a href="${s.url}" target="_blank" style="text-decoration:none; color:var(--color-main);">${inner}</a>`
          //       : `<span style="color:var(--color-main);">${inner}</span>`;
          //     return `<div style="display:flex; gap:12px; padding:6px 0; border-bottom:0.5px solid rgba(255,255,255,0.05); flex-wrap:wrap;">${date}${line}</div>`;
          //   }).join('');
          // }

          function renderList(list) {
            return list.map(s => {
              const date = formatDate(s.date);
              const collab = s.collaborators ? ` · ${s.collaborators}` : '';
              const line1 = `<div style="font-size:12px; color:#bbb;">${date} — ${s.city}</div>`;
              const line2 = `<div style="font-size:13px; color:var(--color-main);">${s.venue}${collab}</div>`;
              const inner = `${line1}${line2}`;
              const linked = s.url
                ? `<a href="${s.url}" target="_blank" style="text-decoration:none;">${inner}</a>`
                : inner;
              return `<div style="margin-bottom:16px;">${linked}</div>`;
            }).join('');
          }

          content.innerHTML = `
        <h2>SHOWS</h2>
        ${upcoming.length ? `
          <p style="font-size:10px; letter-spacing:0.1em; opacity:0.5; margin-bottom:8px;">UPCOMING</p>
          ${renderList(upcoming)}
          <div style="margin-bottom:24px;"></div>
        ` : ''}
        <p style="font-size:10px; letter-spacing:0.1em; opacity:0.5; margin-bottom:8px;">PAST</p>
        ${renderList(past)}
      `;
        });
    }

    function renderBioOverlay() {
      const content = document.getElementById('overlay-content');
      if (!biographyData) return;

      const bio = (biographyData.bio || []).map(p => `<p>${escapeHTML(p)}</p>`).join('');
      const statement = (biographyData.statement || []).map(p => `<p>${escapeHTML(p)}</p>`).join('');

      content.innerHTML = `
    <h2>BIOGRAPHY</h2>
    ${bio}
    <h2>ARTIST STATEMENT</h2>
    ${statement}
    <div class="overlay-icons" style="margin-top:32px;">
      <a href="https://www.instagram.com/maysun.music/" target="_blank">
        <img src="assets/images/logos/ig_logo.png" alt="Instagram">
      </a>
      <a href="https://maysunmusic.bandcamp.com/" target="_blank">
        <img src="assets/images/logos/bc_logo.png" alt="Bandcamp">
      </a>
      <a href="https://www.youtube.com/@MAYSUNmusic" target="_blank">
        <img src="assets/images/logos/yt_logo.png" alt="YouTube">
      </a>
    </div>
  `;
    }

    function closeOverlay() {
      document.getElementById('overlay-backdrop').classList.remove('visible');
      document.getElementById('overlay-panel').style.display = 'none';
      document.getElementById('overlay-close').style.display = 'none';
      document.body.style.overflow = '';
      history.pushState({}, '', window.location.pathname);
    }

    document.addEventListener('click', e => {
      if (e.target.id === 'overlay-backdrop') closeOverlay();
    });

    const hash = window.location.hash.slice(1);
    if (hash) openOverlay(hash);

    window.addEventListener('popstate', e => {
      if (e.state?.overlay) openOverlay(e.state.overlay);
      else closeOverlay();
    });

    function updateColorMode(section) {
      if (section === 'fabrication' || section === 'resources') {
        document.body.classList.add('material-mode');
      } else {
        document.body.classList.remove('material-mode');
      }
    }

  </script>

  <span id="overlay-close" onclick="closeOverlay()">✕</span>
  <div id="overlay-backdrop"></div>
  <div id="overlay-panel">
    <div id="overlay-content"></div>
  </div>

</body>

</html>
