<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAYSUN</title>
  <link rel="stylesheet" href="styles/global.css" />

  <style>
    :root {
      /* DEFAULT = ELECTRIC theme */
      --color-bg: #6c8670;
      --color-main: #e4f1e4;
      /* MAYSUN */
      --color-accent: #80d4d6;

      --panel-width: 320px;
      --panel-gap: 40px;
    }

    /* MATERIAL MODE */
    body.material-mode {
      --color-bg: #e8e6e1;
      --color-main: #1a1a1a;
      --color-accent: #5b8cff;
    }

    body,
    #sticky-top,
    #info-panel,
    #overlay-panel {
      transition: background-color 3.5s ease;
    }

    #site-name,
    .nav-item,
    #search-input,
    #info-panel,
    #overlay-panel,
    .grid-item-title,
    .grid-item-overlay-text,
    #site-footer a {
      transition: color 3.5s ease, border-color 3.5s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      background-color: var(--color-bg);
      position: relative;
      z-index: 0;
      overflow-x: hidden;
      min-height: 100%;
    }

    .grain-overlay {
      position: absolute;
      inset: 0;
      background-image: url("assets/images/misc/grain.gif");
      background-repeat: repeat;
      opacity: 0.02;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: soft-light;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    #site-header {
      padding: 48px 40px 36px;
      max-width: 1000px;
      margin: 0;
    }

    #site-name {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: bold;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      line-height: 1;
      color: var(--color-main)
    }

    #site-name img {
      height: 28px;
      width: auto;
      display: block;
    }

    #site-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      row-gap: 10px;
      column-gap: 0;
      width: calc(100vw - var(--panel-width) - var(--panel-gap) - 80px);
    }

    .nav-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .nav-item {
      font-size: 13px;
      color: var(--color-main);
      letter-spacing: 0.04em;
      padding: 2px 6px;
    }

    /* FILTER behavior */
    .nav-item.filter {
      cursor: pointer;
    }



    .nav-item.filter:hover {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    .nav-item.filter.active {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    /* LINK behavior */
    .nav-item.link {
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-item.link:hover {
      color: var(--color-accent);
    }

    #bio-burger {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 42px;
      color: var(--color-main);
      opacity: 0.6;
      cursor: pointer;
      z-index: 600;
      line-height: 1;
    }

    .nav-break {
      display: none;

    }

    /* ── SEARCH ───────────────────────────────────────────── */
    #search-section {
      position: relative;
      max-width: none;
      margin: 0;
      padding: 0 40px 0px;
      /* border-bottom: 0.5px solid var(--color-main); */
    }

    #search-meta {
      position: absolute;
      right: calc(var(--panel-width) + var(--panel-gap) + 20px);
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--color-accent);
      opacity: 0.5;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--color-accent);
      font-family: Helvetica, Arial, sans-serif;
      font-size: clamp(13px, 1.8vw, 18px);
      padding: 6px 0;
      outline: none;
      background: transparent;
      color: var(--color-accent);
      letter-spacing: 0.01em;
      transition: border-color 3.5s ease, color 3.5s ease;
      clip-path: inset(0 calc(var(--panel-width) + var(--panel-gap)) 0 0);
    }

    #search-input:focus {
      border-bottom-color: var(--color-accent);
    }

    #search-input::placeholder {
      color: var(--color-accent);
    }

    /* ------- MAP --------- */
    #mini-map-container {
      position: fixed;
      top: 48px;
      right: 40px;
      z-index: 5000;
    }

    #mini-map {
      display: grid;
      grid-template-columns: repeat(20, 8px);
      gap: 2px;
      opacity: 0.6;
      pointer-events: none;
    }

    #map-label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-main);
      opacity: 0;
      transition: opacity 0.6s ease;
      margin-top: 8px;
      text-align: right;
      pointer-events: none;
    }

    #mini-map-container:hover #map-label {
      opacity: 0.3;
    }

    .mini-square {
      width: 8px;
      height: 8px;
      background: var(--color-main)33;
    }

    .mini-square.active {
      background: white;
    }

    .mini-square.related {
      background: yellow;
    }

    /* ----- OVERLAY STUFF ---- */
    .overlay-media {
      width: 100%;
      max-width: 700px;
      max-height: 468px;
      height: auto;

      display: block;
      margin: 1em 0 1.5em 0;

      object-fit: contain;
    }

    .overlay-video {
      width: 100%;
      max-width: 700px;
      margin: 0 0 1.5em 0;
    }

    /* ------ RIGHT SIDE PANEL ---- */

    #info-panel {
      position: fixed;
      top: 200px;
      right: var(--panel-gap);
      width: var(--panel-width);
      max-height: calc(100vh - 180px);
      overflow-y: auto;

      color: var(--color-main);
      font-family: Helvetica, Arial, sans-serif;
      font-size: 12px;
      line-height: 1.5;

      z-index: 999;
      background: transparent;
      padding: 0 12px;

      overflow: visible;

    }

    #info-content {
      opacity: 1;
      transition: opacity 8s ease;
    }

    #info-panel h2 {
      color: var(--color-accent);
      font-size: 18px;
      margin-bottom: 10px;
    }

    #info-panel .info-meta {
      color: #bbb;
      font-size: 11px;
      margin-bottom: 14px;
    }

    #info-panel p {
      margin-bottom: 1em;
    }

    .glitch-char {
      display: inline-block;
      position: relative;
      transition: transform 0.6s linear, opacity 1.2s ease;
      transform: translate(var(--dx, 0px)) translateY(var(--dy, 0px));
      white-space: pre;
    }

    p {
      word-break: keep-all;
    }

    #info-scroll {
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }

    /* PANEL HIDDEN MODE */
    body.no-info-panel {

      --panel-width: 0px;
      --panel-gap: 0px;

    }

    body.no-info-panel #info-panel,
    body.no-info-panel #mini-map {
      display: none;
    }

    body.no-info-panel #sticky-top {
      -webkit-mask-image: none;
      mask-image: none;
    }

    body.no-info-panel #search-input {
      clip-path: none;
    }

    body.no-info-panel #site-nav {
      max-width: 100%;
    }

    /* will need to remove this once I get rid of old nav css/html */
    @media (max-width: 1000px) {
      body::before {
        display: none;
      }
    }

    /* ── ITEMS ────────────────────────────────────────────── */
    #items-wrap {
      max-width: calc(100vw - var(--panel-width) - 100px);
      margin-right: 360px;
      margin: 0;
      padding: 36px 40px 60px;
    }

    #items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 36px;
    }

    .grid-item {
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .grid-item-image-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.07);
      position: relative;
      background-color: var(--color-bg);
    }

    .grid-item-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      transition: filter 0.2s, opacity 0.2s;
    }

    .grid-item-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .grid-item:hover .grid-item-overlay {
      opacity: 0.9;
      background: black;
    }

    .grid-item:hover .grid-item-image {
      filter: contrast(1.15) saturate(0.9);
      transform: scale(1.02);
    }

    .grid-item-overlay-text {

      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.6;
      color: var(--color-main);
    }

    .grid-item-title {
      font-weight: bold;
      font-size: 0.88rem;
      margin-top: 10px;
      margin-bottom: 3px;
      color: var(--color-accent);
    }

    .grid-item-type {
      font-size: 0.75rem;
      color: #bbb;
      margin-bottom: 7px;
    }

    .grid-item-placeholder {
      width: 100%;
      height: 100%;
      padding: 12px;

      display: -webkit-box;
      -webkit-line-clamp: 8;
      /* adjust lines here */
      -webkit-box-orient: vertical;

      font-size: 10px;
      line-height: 1.4;
      color: var(--color-main);

      background: black;
      opacity: 0.9;

      overflow: hidden;
    }

    .no-results {
      font-size: 13px;
      color: #bbb;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    /* #site-footer {
      max-width: calc(100vw - var(--panel-width) - var(--panel-gap) - 80px);
      margin: 0;
      margin-right: auto;
      padding: 24px 40px 48px;
      border-top: 0.5px solid var(--color-main);
      display: flex;
      gap: 24px;
    } */

    #site-footer {
      position: relative;

      max-width: calc(100vw - var(--panel-width) - var(--panel-gap));
      margin: 0;
      padding: 24px 40px 48px;

      display: flex;
      gap: 24px;
    }

    #site-footer::before {
      content: "";
      position: absolute;

      top: 0;
      left: 40px;

      width: calc(100% - 80px);

      height: 0.5px;
      background: var(--color-main);
    }

    #site-footer a {
      font-size: 12px;
      color: var(--color-main);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    #site-footer a:hover {
      color: var(--color-accent);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #last-update {
      font-size: 12px;
      color: #555;
      /* dark gray */
      margin-left: auto;
      opacity: 0.5;
    }

    /* ── STICKY TOP ──────────────────────────────────────── */
    #sticky-top {
      position: sticky;
      top: 0;
      z-index: 500;

      background: transparent;

      backdrop-filter: blur(60px);
      -webkit-backdrop-filter: blur(60px);

      -webkit-mask-image: linear-gradient(to right,
          black 0%,
          black calc(100% - var(--panel-width) - var(--panel-gap) - 80px),
          transparent calc(100% - var(--panel-width) - var(--panel-gap)));

      mask-image: linear-gradient(to right,
          black 0%,
          black calc(100% - var(--panel-width) - var(--panel-gap) - 80px),
          transparent calc(100% - var(--panel-width) - var(--panel-gap)));
    }

    /* ── MOBILE ───────────────────────────────────────────── */

    @media (max-width: 640px) {

      #site-name {
        width: 100%;
        display: flex;
        justify-content: center;
        padding-left: 0;
        margin-bottom: 10px;
      }

      body::before {
        display: none;
      }

      #site-header {
        padding: 20px 20px 16px 20px;
      }

      #site-nav {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        margin-top: 20px;
      }

      .nav-row {
        display: flex;
        gap: 16px;
        flex-wrap: nowrap;

      }

      .nav-item.filter {
        padding: 0;
      }

      #search-input {
        font-size: 16px;
      }

      #sticky-top {
        padding-bottom: 0px;
        backdrop-filter: blur(60px);
        -webkit-backdrop-filter: blur(60px);
      }

      body.no-info-panel #sticky-top {
        -webkit-mask-image: none;
        mask-image: none;
      }

      /* burger stays top right */

      #bio-burger {
        position: absolute;
        top: 10px;
        right: 20px;
      }

      .nav-item {
        font-size: 16px;
        text-align: center;
      }

      .nav-item.filter,
      .nav-item.link {
        flex-basis: auto;
      }

      /* FIX */
      .nav-break {
        display: block;
        width: 100%;
      }

      #bio-burger {
        display: block;
      }

      #search-input {
        clip-path: none;
      }

      #search-section {
        padding: 0 20px 0px;
      }

      #items-wrap {
        max-width: 100%;
        padding: 20px 20px 40px;
      }

      #items-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .grid-item-image-container {
        height: 120px;
      }

      .grid-item-title {
        font-size: 0.75rem;
      }

      .grid-item-type {
        font-size: 0.65rem;
      }

      .grid-item:active .grid-item-image-container {
        opacity: 0.7;
      }

      #mini-map-container,
      #info-panel {
        display: none;
      }

      #site-footer {
        padding: 20px 20px 36px;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        text-align: center;
      }

      #last-update {
        width: 100%;
        margin-left: 0;
        text-align: center;
      }

      #overlay-close {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 2002;
        background-color: var(--color-bg);
        padding: 4px 8px;
        opacity: 0.8;
      }

      #overlay-panel {
        padding: 48px 24px 32px;
        max-height: 90vh;
      }
    }


    /* ── OVERLAY ─────────────────────────────────────────── */
    #overlay-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 40, 0.85);
      z-index: 2000;
      cursor: pointer;
    }

    #overlay-backdrop.visible {
      display: block;
    }

    #overlay-panel {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(1100px, 92vw);
      max-width: 94vw;
      max-height: 85vh;
      overflow-y: auto;
      background-color: var(--color-bg);
      border: 0.5px solid var(--color-main);
      padding: 48px;
      z-index: 2001;
      cursor: default;
    }

    #overlay-panel h2 {
      font-size: 28px;
      font-weight: bold;
      color: var(--color-main);
      margin-bottom: 16px;
    }

    #overlay-panel p {
      font-size: 13px;
      color: var(--color-main);
      line-height: 1.6;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    #overlay-panel a {
      color: var(--color-main);
      text-decoration: none;
    }

    #overlay-panel a:hover {
      text-decoration: underline;
    }

    .overlay-icons {
      display: flex;
      gap: 20px;
      margin-top: 24px;
    }

    .overlay-icons a img {
      width: 22px;
      height: 22px;
      opacity: 0.6;
      transition: opacity 0.15s;
      filter: invert(1);
    }

    .overlay-icons a:hover img {
      opacity: 1;
    }

    #overlay-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 28px;
      font-weight: bold;
      color: var(--color-main);
      opacity: 0.6;
      cursor: pointer;
      z-index: 2002;
      display: none;
      line-height: 1;
    }

    #overlay-close:hover {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="grain-overlay"></div>

  <div id="sticky-top">
    <!-- HEADER -->
    <header id="site-header">
      <div id="site-name" onclick="resetAll()" style="cursor:pointer;">
        <img src="assets/images/logos/maysun_logo.png" alt="MAYSUN">
      </div>
      <span id="bio-burger" onclick="openOverlay('bio')">☰</span>
      <nav id="site-nav">
        <div class="nav-row">
          <span class="nav-item filter" data-section="story">forever in sound</span>
          <span class="nav-item filter" data-section="albums">music</span>
          <span class="nav-item filter" data-section="fabrication">fabrication</span>
        </div>
        <div class="nav-row">
          <span class="nav-item link" onclick="openOverlay('shows')" style="cursor:pointer;">shows</span>
          <span class="nav-item filter" data-section="resources">resources</span>
          <span class="nav-item link" onclick="openOverlay('contact')" style="cursor:pointer;">contact</span>
        </div>
      </nav>
    </header>

    <!-- SEARCH -->
    <div id="search-section">
      <input type="text" id="search-input" placeholder="filter by:" autocomplete="off" spellcheck="false" />
      <div id="search-meta"></div>
    </div>
  </div>
  </div>

  <div id="mini-map-container">
    <div id="mini-map"></div>
    <span id="map-label">system</span>
  </div>
  <!-- ITEMS -->
  <div id="items-wrap">
    <div id="items-grid"></div>
  </div>


  <aside id="info-panel">
    <div id="info-scroll">
      <div id="info-content"></div>
    </div>
  </aside>

  <!-- FOOTER -->
  <footer id="site-footer">
    <a href="https://www.instagram.com/maysun.music/" target="_blank">instagram</a>
    <a href="https://maysunmusic.bandcamp.com/" target="_blank">bandcamp</a>
    <a href="https://www.youtube.com/@MAYSUNmusic" target="_blank">youtube</a>
    <a href="contact.html">contact</a>
    <span id="last-update"></span>
  </footer>

  <script>
    let miniMap = new Map();
    let allItems = [];
    let biographyData = null;
    let bioTimeout = null;
    let activeSection = null;
    let similarityMap = new Map();

    // approved word bank for tags
    const TAG_BANK = [
      'spatial',
      'cyclical',
      'modular',
      'granular',
      'process',
      'field-recording',
      'generative',
      'reamping',
      'installation',
      'acoustic',
      'dante',
      'feedback',
      'diy',
      'drums',
      'album',
      'XP4L',
      'daisy',
      'residency',
      'plugin',
      'synth',
      'life',
      'utility',
      'samples',
      'industry'
    ];

    Promise.all([
      fetch('data/diy_makes.json').then(r => r.json()),
      fetch('data/albums.json').then(r => r.json()),
      fetch('data/spatial_templates.json').then(r => r.json()),
      fetch('data/forever.json').then(r => r.json()),
      fetch('data/installations.json').then(r => r.json()),
      fetch('data/biography.json').then(r => r.json())
    ]).then(([diy, albums, spatial, forever, installations, biography]) => {
      biographyData = biography;
      allItems = [...diy, ...albums, ...spatial, ...forever, ...installations]
        .sort((a, b) => {
          const yearDiff = Number(b.year) - Number(a.year);
          if (yearDiff !== 0) return yearDiff;
          return Number(b.month || 0) - Number(a.month || 0);
        });
      renderDefaultInfo();
      renderItems(allItems, '');
      buildSimilarityMap();
    });

    document.getElementById('search-input').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      if (q) {
        activeSection = null;
        document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
      }
      const filtered = q ? allItems.filter(item => matches(item, q)) : allItems;
      renderItems(filtered, q);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.querySelectorAll('.nav-item.filter').forEach(el => {
      el.addEventListener('click', () => {
        if (!allItems.length) return;
        const section = el.dataset.section;

        if (activeSection === section) {
          activeSection = null;
          updateColorMode(null);
          document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
          renderItems(allItems, '');
        } else {
          activeSection = section;
          updateColorMode(section);

          document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));

          el.classList.add('active');

          let filtered = allItems.filter(item => item.section === section);

          if (section === 'story') {
            filtered = filtered.sort((a, b) => b.title.localeCompare(a.title));

          }

          renderItems(filtered, '');
        }

        document.getElementById('search-input').value = '';

        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

    function matches(item, q) {
      const haystack = [
        item.title || '',
        item.type || '',
        item.year || '',
        item.description || '',
        item.short_description || '',
        item.back_story || '',
        item.future || '',
        (item.tags || []).join(' '),
        (item.components || []).join(' '),
        (item.components_tx || []).join(' '),
        (item.components_rx || []).join(' ')
      ].join(' ').toLowerCase();

      return haystack.includes(q);
    }

    // function isRelated(a, b) {
    //   if (a.id === b.id) return true;

    //   return (a.relations || []).includes(b.id) ||
    //     (b.relations || []).includes(a.id);
    // }

    function getPreviewText(item) {
      const text = (item.description || item.short_description || '').trim();

      // first line only
      const firstLine = text.split('\n')[0];

      // limit length
      return firstLine.length > 80
        ? firstLine.slice(0, 80) + '...'
        : firstLine;
    }

    function getForeverPreview(item) {
      const text = (item.description || '').trim();

      return text.length > 200
        ? text.slice(0, 200) + '...'
        : text;
    }

    function escapeHTML(str) {

    function createGlitchParagraph(text) {
      const p = document.createElement('p');

      text.split(' ').forEach((word, i) => {
        const wordSpan = document.createElement('span');
        wordSpan.style.whiteSpace = 'nowrap';

        word.split('').forEach(char => {
          const span = document.createElement('span');
          span.className = 'glitch-char';
          span.innerHTML = char === ' ' ? '&nbsp;' : char;
          wordSpan.appendChild(span);
        });

        p.appendChild(wordSpan);

        // add space between words
        if (i < text.split(' ').length - 1) {
          p.appendChild(document.createTextNode(' '));
        }
      });

      return p;
    }

    function glitchCharacter(el, mouseX, mouseY) {
      const rect = el.getBoundingClientRect();

      const dx = (rect.left + rect.width / 2) - mouseX;
      const dy = (rect.top + rect.height / 2) - mouseY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      const RADIUS = 2000;
      if (distance > RADIUS) return;

      const proximity = 1 - distance / RADIUS;

      // ---- ORIGINAL LETTER FADES (does NOT move) ----
      clearTimeout(el._fadeTimeout);

      // map proximity → opacity (never fully gone)
      const minOpacity = 0.35; // lowest visible
      const targetOpacity = minOpacity + (1 - proximity) * (1 - minOpacity);

      // immediate drop (no transition)
      el.style.transition = 'none';
      el.style.opacity = targetOpacity;

      // smooth return to full
      el._fadeTimeout = setTimeout(() => {
        el.style.transition = 'opacity 12s ease';
        el.style.opacity = 1;
      }, 320 + Math.random() * 1000);

      // ---- GHOST CLONE ----
      const clone = el.cloneNode(true);

      clone.style.position = 'fixed'; // IMPORTANT: stable positioning
      clone.style.left = rect.left + 'px';
      clone.style.top = rect.top + 'px';
      clone.style.pointerEvents = 'none';
      clone.style.margin = 0;

      const color = getComputedStyle(el).color;
      clone.style.color = color;

      const cs = getComputedStyle(el);

      clone.style.fontSize = cs.fontSize;
      clone.style.fontFamily = cs.fontFamily;
      clone.style.fontWeight = cs.fontWeight;
      clone.style.letterSpacing = cs.letterSpacing;
      clone.style.lineHeight = cs.lineHeight;

      clone.style.zIndex = 2000;

      // random scatter (NOT directional)
      const scatterX = (Math.random() - 0.5) * 200 * proximity;
      const scatterY = (Math.random() - 0.5) * 300 * proximity;

      clone.style.transform = `translate(${scatterX}px, ${scatterY}px)`;

      // random opacity for texture
      clone.style.opacity = 0.05 + Math.random() * 0.3;

      const duration = 4 + Math.random() * 6;
      clone.style.transition = `opacity ${duration}s ease`;

      document.body.appendChild(clone);

      // fade OUT clone
      requestAnimationFrame(() => {
        clone.style.opacity = 0;
      });

      // cleanup
      setTimeout(() => {
        clone.remove();
      }, duration * 4000);
    }

    function enableBioGlitch(container) {
      container.addEventListener('mousemove', (e) => {
        if (!container.contains(e.target)) return;
        const el = e.target;
        if (!el.classList.contains('glitch-char')) return;

        const chars = el.parentElement.querySelectorAll('.glitch-char');

        const index = Array.from(chars).indexOf(el);

        for (let i = index - 4; i <= index + 4; i++) {
          if (chars[i]) {
            glitchCharacter(chars[i], e.clientX, e.clientY);
          }
        }
      });
    }

    function getWords(item) {
      const text = [
        item.title || '',
        item.description || '',
        item.short_description || '',
        item.back_story || ''

      return new Set(text.match(/\b[a-z]{3,}\b/g)?.filter(w => !STOP_WORDS.has(w)) || []);
    }

    function buildSimilarityMap() {
      const wordSets = new Map();
      allItems.forEach(item => wordSets.set(item.id, getWords(item)));

      allItems.forEach(a => {
        const wordsA = wordSets.get(a.id);
        const scores = new Map();
        allItems.forEach(b => {
          if (a.id === b.id) return;
          const wordsB = wordSets.get(b.id);
          let shared = 0;
          wordsA.forEach(w => { if (wordsB.has(w)) shared++; });
          const score = shared / Math.sqrt(wordsA.size * wordsB.size);
          if (score > 0.1) scores.set(b.id, score);
        });
        similarityMap.set(a.id, scores);
      });
    }

        const txtBlock = item.txt ? `
          <div style="margin-top:1.5em;">
            <div style="font-size:10px; letter-spacing:0.1em; opacity:0.5; margin-bottom:8px;">SPEAKER LAYOUT</div>
            <textarea readonly style="width:100%; height:120px; font-family:monospace; font-size:10px; background:rgba(0,0,0,0.2); color:var(--color-main); border:0.5px solid var(--color-main); padding:10px; resize:vertical; box-sizing:border-box;">${item.txt}</textarea>
            <button onclick="downloadTxt('${item.id}', '${item.filename || item.id + '.txt'}')"
              style="margin-top:8px; font-size:11px; letter-spacing:0.08em; background:none; border:0.5px solid var(--color-main); color:var(--color-main); padding:6px 20px; cursor:pointer;">
              Download .txt
            </button>
          </div>
        ` : '';

        content.innerHTML = `
          <h2>${escapeHTML(item.title || '')}</h2>
          <div style="font-size:11px; color:#bbb; margin-bottom:1.5em;">${escapeHTML(metaLine)}</div>
          ${venueLink ? `<div style="margin-bottom:1em;">${venueLink}</div>` : ''}
          ${bandcampEmbed}
          ${resourceLink}
          ${item.description ? `<p>${escapeHTML(item.description).replace(/\n/g, '<br>')}</p>` : ''}
          ${galleryBlock}
          ${txtBlock}
          ${relatedBlock}
        `;
        return;
      }

      // FABRICATION LAYOUT
      const components = [
        ...(item.components || []),
        ...(item.components_tx || []),
        ...(item.components_rx || [])
      ];

      const componentBlock = components.length ? `
        <h2>Components</h2>
        <ul style="padding-left:20px; margin-bottom:1.5em;">
          ${components.map(c => `<li style="margin-bottom:4px; font-size:13px; opacity:0.8;">${escapeHTML(c)}</li>`).join('')}
        </ul>
      ` : '';

      const futureBlock = item.future ? `
        <h2>Next Steps</h2>
        <p>${escapeHTML(item.future)}</p>
      ` : '';

      const linksBlock = (item.links || []).length ? `
        <div style="margin-bottom:1.5em;">
          ${item.links.map(l => `<a href="${escapeHTML(l.url)}" target="_blank" style="display:block; margin-bottom:8px; font-size:13px;">${escapeHTML(l.label)}</a>`).join('')}
        </div>
      ` : '';

      const galleryBlock = (item.gallery || []).length ? `
        <div style="margin-top:1.5em;">
          <h2 style="margin-bottom:12px;">WIP Pictures</h2>
<img 
  id="gallery-focus" 
  src="${item.gallery[0]}" 
  style="
width:100%;
    max-width:700px;
    max-height:500px;
    height:auto;
    object-fit:contain;
    display:block;
    margin:0 0 8px 0;
  "
>            ${item.gallery.map(img => `
              <img src="${img}" onclick="setGalleryFocus('${img}')"
                style="height:56px; width:auto; object-fit:cover; cursor:pointer; opacity:0.6; transition:opacity 0.15s;"
                onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">
            `).join('')}
          </div>
        </div>
      ` : '';

      const mainImage = item.main_image
        ? `<img src="${item.main_image}" class="overlay-media" loading="lazy">`
        : '';

      content.innerHTML = `
        <h2>${escapeHTML(item.title || '')}</h2>
<div style="font-size:11px; color:#bbb; margin-bottom:1.5em;">${escapeHTML(item.type || '')} · ${formatItemDate(item)}</div>
      ${mainImage}
        ${item.short_description ? `<p>${item.short_description.replace(/\n/g, '<br>')}</p>` : ''}
        ${item.back_story ? `<h2>Reason for Making</h2><p>${escapeHTML(item.back_story).replace(/\n/g, '<br>')}</p>` : ''}
        ${componentBlock}
        ${futureBlock}
        ${linksBlock}
        ${galleryBlock}
        ${relatedBlock}
      `;
    }

    function closeOverlay() {
      document.getElementById('overlay-backdrop').classList.remove('visible');
      document.getElementById('overlay-panel').style.display = 'none';
      document.getElementById('overlay-close').style.display = 'none';
      document.body.style.overflow = '';
      history.pushState({}, '', window.location.pathname);
    }

    function resetAll() {
      activeSection = null;
      updateColorMode(null);
      document.querySelectorAll('.nav-item.filter').forEach(c => c.classList.remove('active'));
      document.getElementById('search-input').value = '';
      renderItems(allItems, '');
      buildSimilarityMap();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (bioTimeout) { clearTimeout(bioTimeout); bioTimeout = null; }
      const panel = document.getElementById('info-content');
      panel.style.transition = 'opacity 0.3s ease';
      panel.style.opacity = 0;
      setTimeout(() => {
        renderDefaultInfo();
        panel.style.transition = 'opacity 8s ease';
        panel.style.opacity = 1;
      }, 300);
    }

    document.addEventListener('click', e => {
      if (e.target.id === 'overlay-backdrop') closeOverlay();
    });

    function restoreBio() {
      if (bioTimeout) { clearTimeout(bioTimeout); bioTimeout = null; }
      const panel = document.getElementById('info-content');
      panel.style.transition = 'opacity 0.3s ease';
      panel.style.opacity = 0;
      setTimeout(() => {
        renderDefaultInfo();
        panel.style.transition = 'opacity 8s ease';
        panel.style.opacity = 1;
      }, 300);
    }

    document.getElementById('items-wrap').addEventListener('click', e => {
      if (!e.target.closest('.grid-item')) restoreBio();
    });

    document.getElementById('info-panel').addEventListener('click', () => {
      restoreBio();
    });

    const hash = window.location.hash.slice(1);
    if (hash) openOverlay(hash);

    window.addEventListener('popstate', e => {
      if (e.state?.overlay) openOverlay(e.state.overlay);
      else closeOverlay();
    });

    function updateColorMode(section) {
      if (section === 'fabrication' || section === 'resources') {
        document.body.classList.add('material-mode');
      } else {
        document.body.classList.remove('material-mode');
      }
    }

    function updateLayoutMode() {
      if (window.innerWidth <= 640) {
        document.body.classList.add('no-info-panel');
      } else {
        document.body.classList.remove('no-info-panel');
      }
    }

    updateLayoutMode();
    window.addEventListener('resize', updateLayoutMode);

  </script>

  <span id="overlay-close" onclick="closeOverlay()">✕</span>
  <div id="overlay-backdrop"></div>
  <div id="overlay-panel">
    <div id="overlay-content"></div>
  </div>

</body>

</html>
