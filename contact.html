<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact</title>

  <link rel="stylesheet" href="styles/global.css" />
  <script src="components/nav.js"></script>

  <style>
    html {
      scroll-behavior: smooth;
    }

    .top-section-nav {
      position: fixed;
      right: 0;
      top: 60px;
      width: 150px;
      height: calc(100vh - 60px);
      background: white;
      padding: 20px 5px 20px 10px;
      overflow-y: auto;
      z-index: 500;
    }

    .top-section-nav-container {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 20px;
    }

    .top-section-square {
      width: 25px;
      height: 25px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #666;
      text-decoration: none;
    }

    .top-section-square.filled {
      background: black;
      border-color: black;
      color: #999;
    }

    .top-section-square:hover {
      transform: scale(1.2);
      z-index: 9;
    }

    @media (max-width: 768px) {
      .top-section-nav {
        display: none;
      }
    }

    .content-container {
      width: calc(100% - 150px);
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
      padding: 100px 20px 32px;
    }

    .content-container h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
    }

    .content-container p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .content-container a {
      color: black;
      text-decoration: none;
      border-bottom: 1px solid black;
    }

    .content-container a:hover {
      background: black;
      color: white;
    }

    .section-divider {
      display: none;
    }

    .resources-container {
      width: calc(100% - 150px);
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 100px;
    }

    .resources-container h2 {
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .resources-container .resources-subtitle {
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 56px;
      color: #666;
    }

    .resources-section-title {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 0;
      border-bottom: none;
      color: #666;
    }

    .venues-grid {
      display: flex;
      flex-direction: column;
      gap: 56px;
      margin-bottom: 96px;
    }

    .venue-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: center;
    }

    .venue-card-text h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .venue-card-text .venue-meta {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 4px;
    }

    .venue-card-text .speaker-count {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 4px;
    }

    .venue-card-text textarea {
      width: 100%;
      height: 180px;
      font-family: monospace;
      font-size: 0.7rem;
      resize: vertical;
      border: 1px solid #ddd;
      padding: 10px;
      box-sizing: border-box;
      background: #fafafa;
      margin-bottom: 10px;
    }

    .venue-card-text .venue-date {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 12px;
    }

    .venue-image-cycle {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
    }

    .venue-image-cycle img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .venue-image-cycle img.active {
      opacity: 1;
    }

    .venue-url {
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    .venue-url a {
      color: black;
      text-decoration: none;
      border-bottom: 1px solid black;
    }

    .copy-btn {
      font-size: 0.50rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: none;
      border: 1px solid #ccc;
      padding: 6px 70px;
      cursor: pointer;
    }

    .copy-btn:hover,
    .copy-btn.copied {
      background: black;
      color: white;
      border-color: black;
    }

    .samples-grid {
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    .sample-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .sample-card-text {
      padding-top: 4px;
    }

    .sample-card-text h3 {
      font-size: 1.05rem;
      margin-bottom: 12px;
    }

    .sample-card-text p {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .sample-card-text a {
      font-size: 0.8rem;
      color: black;
      text-decoration: none;
      border-bottom: 1px solid black;
    }

    .sample-card-text a:hover {
      background: black;
      color: white;
    }

    .sample-card-image a {
      display: block;
    }

    .sample-card-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .sample-card-image a:hover img {
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .top-section-nav {
        display: none;
      }

      .content-container,
      .resources-container {
        width: 100%;
      }
    }

    @media (max-width: 600px) {

      .venue-card,
      .sample-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <script>
    fetch('components/nav.html')
      .then(res => res.text())
      .then(html => document.body.insertAdjacentHTML('afterbegin', html));
  </script>

  <div class="top-section-nav">
    <div class="top-section-nav-container">
      <a href="#contact" class="top-section-square filled" title="Contact">C</a>
      <a href="#spatial" class="top-section-square filled" title="Spatial">Sp</a>
      <a href="#samples" class="top-section-square filled" title="Samples">Sa</a>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="content-container" id="contact">
    <h1>CONTACT</h1>
    <p>Collaborations, commissions, questions.</p>
    <p>
      <a href="mailto:maysun.booking@gmail.com">maysun.booking@gmail.com</a>
    </p>
  </div>

  <hr class="section-divider" />

  <!-- RESOURCES -->
  <div class="resources-container">
    <h2>RESOURCES</h2>
    <div class="resources-section-title" id="spatial">Multichannel Speaker Layouts (.txt)</div>
    <div class="venues-grid" id="venues-grid">
      <!-- populated by JS -->
    </div>

    <div class="resources-section-title" id="samples">Free Samples</div>
    <div class="samples-grid" id="samples-grid">
      <!-- populated by JS -->
    </div>
  </div>

  <script>

    // add this to reforesters later
    // "txt": "# ======================================\n# File \"reforesters_spat.txt\"\n# Made with XP4L - www.xp4l.com/\n# AED positions provided by Reforesters\n# Scaled 0.3x\n# formatted by Etienne Mason - MAYSUN - www.maysun.zip\n# AED data compatible with Spat5 (Max/MSP) \n# and other OSC-based spatial audio software\n# Sub channels (not in AED layout)\n# ch 25 = floor sub\n# ch 26 = ceiling sub\n# ======================================\n/speaker/number 24\n/speakers/correction/delay \"auto\"\n/speakers/correction/gain \"auto\"\n/speakers/aed -46 63.6 0.9 43 63.6 0.9 135.4 63.6 0.9 -132.4 63.6 0.9 -26.0818 34.131 1.26915 25.1235 34.1334 1.269069 64.3198 34.006 1.273251 118.577 34.2931 1.263879 153.185 34.4334 1.259358 -155.749 35.024 1.24077 -116.948 35.0177 1.240965 -62.0449 35.5458 1.224906 -35.9856 2.6 1.153905 0.105327 14.4476 0.988248 36.1935 2.6 1.154019 54.8738 2.63285 1.13949 86.3828 2.37374 0.947841 126.927 2.63949 1.136625 142.255 2.60347 1.152342 -180 2.40549 0.93534 -140.383 2.6 1.153509 -130.249 2.54479 1.178892 -89.6984 3.51854 0.895263 -49.7505 2.54479 1.178892\n/speaker/1/name \"1\"\n/speaker/2/name \"2\"\n/speaker/3/name \"3\"\n/speaker/4/name \"4\"\n/speaker/5/name \"5\"\n/speaker/6/name \"6\"\n/speaker/7/name \"7\"\n/speaker/8/name \"8\"\n/speaker/9/name \"9\"\n/speaker/10/name \"10\"\n/speaker/11/name \"11\"\n/speaker/12/name \"12\"\n/speaker/13/name \"13\"\n/speaker/14/name \"14\"\n/speaker/15/name \"15\"\n/speaker/16/name \"16\"\n/speaker/17/name \"17\"\n/speaker/18/name \"18\"\n/speaker/19/name \"19\"\n/speaker/20/name \"20\"\n/speaker/21/name \"21\"\n/speaker/22/name \"22\"\n/speaker/23/name \"23\"\n/speaker/24/name \"24\""

    Promise.all([
      fetch('data/spatial_templates.json').then(res => res.json()),
      fetch('data/albums.json').then(res => res.json())
    ]).then(([spatData, albumData]) => {
      renderVenues(spatData.venues);
      renderSamples(albumData.samples);
      startVenueImageCycles();
    });

    function startVenueImageCycles() {
      const cycles = document.querySelectorAll('.venue-image-cycle');

      cycles.forEach(cycle => {
        const images = cycle.querySelectorAll('img');
        if (images.length <= 1) return;

        let index = 0;

        setInterval(() => {
          images[index].classList.remove('active');
          index = (index + 1) % images.length;
          images[index].classList.add('active');
        }, 3000);
      });
    }

    function renderVenues(venues) {
      const grid = document.getElementById('venues-grid');
      grid.innerHTML = venues.map(v => `
        <div class="venue-card">
          <div class="venue-card-image">
            ${v.pictures && v.pictures.length ? `
  <div class="venue-image-cycle" data-venue="${v.id}">
    ${v.pictures.map((img, i) => `
      <img src="${img}" alt="${v.name}" class="${i === 0 ? 'active' : ''}" />
    `).join('')}
  </div>
` : ''}
          </div>
          <div class="venue-card-text">
            <h3>${v.name}</h3>
            <div class="venue-meta">${v.location}</div>
<div class="speaker-count">${v.speakers} structure</div>
${v.date ? `<div class="venue-date">Mapped ${v.date}</div>` : ''}
${v.url ? `<div class="venue-url"><a href="${v.url}" target="_blank" rel="noopener">${v.url}</a></div>` : ''}            <textarea readonly id="txt-${v.id}">${v.txt}</textarea>
<button class="copy-btn" onclick="downloadTxt('${v.id}', '${v.filename}')">Download</button>          </div>
        </div>
      `).join('');
    }

    function renderSamples(samples) {
      const grid = document.getElementById('samples-grid');
      grid.innerHTML = samples.map(s => `
        <div class="sample-card">
          <div class="sample-card-text">
            ${s.description ? `<p>${s.description}</p>` : ''}
            <a href="${s.bandcamp}" target="_blank" rel="noopener">Listen / Download</a>
          </div>

          <div class="sample-card-image">
            <a href="${s.bandcamp}" target="_blank" rel="noopener">
              ${s.picture ? `<img src="${s.picture}" alt="${s.title}" />` : ''}
            </a>
          </div>
        </div>
      `).join('');
    }

    function downloadTxt(id, filename) {
      const ta = document.getElementById(`txt-${id}`);
      const blob = new Blob([ta.value], { type: 'text/plain' });

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;

      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>
</body>


</html>
