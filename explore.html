<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAYSUN</title>
  <link rel="stylesheet" href="styles/global.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: rgb(26, 1, 79);
      position: relative;
      z-index: 0;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    #site-header {
      padding: 48px 40px 36px;
      max-width: 1000px;
      margin: 0 auto;
    }

    #site-name {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: bold;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      line-height: 1;
      color: #00eeff
    }

    #site-nav {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    #site-nav a {
      font-size: 13px;
      color: #00eeff;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    #site-nav a:hover {
      color: #ee00ff;
    }

    /* ── SEARCH ───────────────────────────────────────────── */
    #search-section {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 40px 32px;
      border-bottom: 0.5px solid #00f7ff;
    }

    #search-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #ee00ff;
      font-family: Helvetica, Arial, sans-serif;
      font-size: clamp(16px, 3vw, 24px);
      padding: 6px 0;
      outline: none;
      background: transparent;
      color: #ee00ff;
      letter-spacing: 0.01em;
      transition: border-color 0.2s;
    }

    #search-input:focus {
      border-bottom-color: #ee00ff;
    }

    #search-input::placeholder {
      color: #ee00ff;
    }

    #search-meta {
      font-size: 11px;
      color: #ee00ff;
      margin-top: 8px;
      letter-spacing: 0.04em;
      min-height: 14px;
    }

    /* ── ITEMS ────────────────────────────────────────────── */
    #items-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 40px 60px;
    }

    #items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 36px;
    }

    .grid-item {
      cursor: pointer;
      transition: opacity 1s ease-in, filter 1s ease-in;
    }

    .grid-item.dimmed {
      opacity: 0.15;
      filter: brightness(0.1) saturate(0.6);
      transition: opacity 2s ease-out, filter 2s ease-out;
    }

    .grid-item.dimmed {
      opacity: 0.15;
      filter: brightness(0.4) saturate(0.6);
    }

    .grid-item-image-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.07);
      position: relative;
      background: #000000;
    }

    .grid-item-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      transition: filter 0.2s, opacity 0.2s;
    }

    .grid-item-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .grid-item:hover .grid-item-overlay {
      opacity: 0.9;
      background: black;
    }

    .grid-item:hover .grid-item-image {
      filter: contrast(1.15) saturate(0.9);
      transform: scale(1.02);
    }

    .grid-item-overlay-text {

      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.6;
      color: #00eeff;
    }

    .grid-item-title {
      font-weight: bold;
      font-size: 0.88rem;
      margin-top: 10px;
      margin-bottom: 3px;
      color: #ee00ff;
    }

    .grid-item-type {
      font-size: 0.75rem;
      color: #bbb;
      margin-bottom: 7px;
    }

    .no-results {
      font-size: 13px;
      color: #bbb;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    #site-footer {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 40px 48px;
      border-top: 0.5px solid #00eeff;
      display: flex;
      gap: 24px;
    }

    #site-footer a {
      font-size: 12px;
      color: #00eeff;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    #site-footer a:hover {
      color: #ee00ff;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid-item {
      animation: fadeUp 0.2s ease forwards;
    }

    /* ── MOBILE ───────────────────────────────────────────── */
    @media (max-width: 640px) {

      #site-header,
      #search-section,
      #items-wrap,
      #site-footer {
        padding-left: 20px;
        padding-right: 20px;
      }

      #site-header {
        padding-top: 32px;
      }

      #items-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header id="site-header">
    <div id="site-name">MAYSUN</div>
    <nav id="site-nav">
      <a href="forever.html">forever in sound</a>
      <a href="biography.html">bio</a>
      <a href="activities.html">shows</a>
      <a href="contact.html">contact</a>
    </nav>
  </header>

  <!-- SEARCH -->
  <div id="search-section">
    <input type="text" id="search-input" placeholder="filter:" autocomplete="off" spellcheck="false" />
    <div id="search-meta"></div>
  </div>

  <!-- ITEMS -->
  <div id="items-wrap">
    <div id="items-grid"></div>
  </div>

  <!-- FOOTER -->
  <footer id="site-footer">
    <a href="https://www.instagram.com/maysun.music/" target="_blank">instagram</a>
    <a href="https://maysunmusic.bandcamp.com/" target="_blank">bandcamp</a>
    <a href="https://www.youtube.com/@MAYSUNmusic" target="_blank">youtube</a>
  </footer>

  <script>
    let elementMap = new Map();
    let allItems = [];

    Promise.all([
      fetch('data/diy_makes.json').then(r => r.json()),
      fetch('data/albums.json').then(r => r.json()),
      fetch('data/spatial_templates.json').then(r => r.json())
    ]).then(([diy, albums, spatial]) => {
      allItems = [...diy, ...albums, ...spatial];
      renderItems(allItems, '');
    });

    document.getElementById('search-input').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      const filtered = q ? allItems.filter(item => matches(item, q)) : allItems;
      renderItems(filtered, q);
    });

    function matches(item, q) {
      const haystack = [
        item.title || '',
        item.type || '',
        item.short_description || '',
        item.back_story || '',
        item.future || '',
        (item.tags || []).join(' '),
        (item.components || []).join(' '),
        (item.components_tx || []).join(' '),
        (item.components_rx || []).join(' ')
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    }

    function isRelated(a, b) {
      if (a.id === b.id) return true;

      return (a.relations || []).includes(b.id) ||
        (b.relations || []).includes(a.id);
    }

    function renderItems(items, q) {
      const meta = document.getElementById('search-meta');
      const grid = document.getElementById('items-grid');

      meta.textContent = q
        ? (items.length ? items.length + ' result' + (items.length !== 1 ? 's' : '') : '')
        : '';

      grid.innerHTML = '';
      elementMap.clear();

      if (items.length === 0) {
        grid.innerHTML = '<div class="no-results">nothing found for "' + q + '"</div>';
        return;
      }

      items.forEach((item, idx) => {

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = item.short_description || '';
        const text = (tempDiv.textContent || '').trim();
        const preview = text.length > 80 ? text.slice(0, 80) + '...' : text;

        const el = document.createElement('div');
        el.className = 'grid-item';
        el.dataset.id = item.id;
        el.style.animationDelay = (idx * 30) + 'ms';

        el.innerHTML = `
          <div class="grid-item-image-container">
            <img class="grid-item-image" src="${item.main_image}" alt="${item.title}" loading="lazy" onerror="this.src='assets/fallback.jpg'">
            <div class="grid-item-overlay">
              <span class="grid-item-overlay-text">${(item.tags || []).slice(0, 5).join(' · ')}</span>
            </div>
          </div>
          <div class="grid-item-title">${item.title}</div>
          <div class="grid-item-type">${item.type} · ${item.year}</div>
        `;

        const goTo = () => { if (item.url) window.location.href = item.url; };
        el.addEventListener('click', goTo);

        el.addEventListener('mouseenter', () => {

          // dim everything
          elementMap.forEach(el => el.classList.add('dimmed'));

          // undim self
          elementMap.get(item.id)?.classList.remove('dimmed');

          // undim relations
          (item.relations || []).forEach(relId => {
            elementMap.get(relId)?.classList.remove('dimmed');
          });

        });

        el.addEventListener('mouseleave', () => {
          elementMap.forEach(el => el.classList.remove('dimmed'));
        });

        elementMap.set(item.id, el);
        grid.appendChild(el);
      });
    }

    function getRelated(item) {
      const scores = {};
      allItems.forEach(other => {
        if (other.id === item.id) return;
        let score = 0;
        if ((item.relations || []).includes(other.id)) score += 10;
        if ((other.relations || []).includes(item.id)) score += 10;
        const shared = (item.tags || []).filter(t => (other.tags || []).includes(t));
        score += shared.length;
        if (score > 0) scores[other.id] = { item: other, score };
      });
      return Object.values(scores)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3)
        .map(s => s.item);
    }
  </script>

</body>

</html>
