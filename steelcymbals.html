<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEEL CYMBALS</title>
  <link rel="stylesheet" href="styles/global.css" />
  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
    }

    .content-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 160px 20px 100px;
      box-sizing: border-box;
    }

    .main-image {
      width: 100%;
      height: auto;
      margin: 10px 0 20px 0;
    }

    h1 {
      font-size: clamp(40px, 10vw, 100px);
      font-weight: bold;
      margin: 20px 0 10px 0;
      line-height: 1.1;
      text-align: center;
      letter-spacing: 0.5px;

      width: 100vw;
      margin-left: calc(-50vw + 50%);
    }

    p,
    .section p {
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
    }

    .section h2 {
      margin-bottom: 0;
    }

    .carousel {
      display: flex;
      overflow-x: hidden;
      gap: 5px;
      padding: 10px 0;
      position: relative;
      cursor: grab;
    }

    .carousel-track {
      display: flex;
      gap: 5px;
      min-width: 200%;
    }

    .carousel img {
      height: 400px;
      flex-shrink: 0;
    }

    .section {
      margin: 40px 0;
    }

    .section ul {
      padding-left: 20px;
      margin-top: 10px;
    }

    .section li {
      margin-bottom: 6px;
    }

    .section:last-of-type {
      padding-bottom: 100px;
    }
  </style>
</head>

<body>

  <div class="content-container" id="deviceContent"></div>

  <script>
    fetch('data/diy_makes.json')
      .then(res => res.json())
      .then(devices => {
        const id = 'steel_cymbals';
        const idx = devices.findIndex(d => d.id === id);
        const device = devices[idx];

        if (!device) {
          document.getElementById('deviceContent').innerHTML = `<h1>Not found</h1>`;
          return;
        }

        const next = devices[(idx + 1) % devices.length];
        const container = document.getElementById('deviceContent');

        const fallbackMain = 'assets/images/placeholders/device_placeholder_1600w.jpg';
        const fallbackGallery = 'assets/images/placeholders/device_placeholder_900h.jpg';

        const gallery = Array.isArray(device.gallery) ? device.gallery : [];
        const duplicatedGallery = gallery.concat(gallery);

        container.innerHTML = `
          <h1>${device.title}</h1>

          <img
            src="${device.main_image || fallbackMain}"
            onerror="this.onerror=null; this.src='${fallbackMain}';"
            class="main-image"
          />

          <div class="section">
            <h2>Overview</h2>
            <p>${device.short_description || ''}</p>
          </div>

          <div class="section">
            <h2>Reason for Making</h2>
            <p>${device.back_story || ''}</p>
          </div>

          ${device.components ? `
          <div class="section">
            <h2>Components</h2>
            <ul>
              ${device.components.map(item => `<li>${item}</li>`).join('')}
            </ul>
          </div>
          ` : ''}

          ${device.tools ? `
          <div class="section">
            <h2>Tools</h2>
            <ul>
              ${device.tools.map(item => `<li>${item}</li>`).join('')}
            </ul>
          </div>
          ` : ''}

          <hr>

          <div class="section">
            <div class="carousel">
              <div class="carousel-track">
                ${duplicatedGallery.length
            ? duplicatedGallery.map(img => `
                    <img src="${img || fallbackGallery}"
                    onerror="this.onerror=null; this.src='${fallbackGallery}';">
                  `).join('')
            : `
                    <img src="${fallbackGallery}">
                    <img src="${fallbackGallery}">
                  `
          }
              </div>
            </div>
          </div>
        `;

        const nav = document.createElement('div');
        nav.style.textAlign = 'right';
        nav.style.marginTop = '20px';
        nav.innerHTML = `<a href="${next.url}" style="text-decoration:none;color:inherit;">NEXT →</a>`;
        container.appendChild(nav);

        window.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowRight') location.href = next.url;
        });

        document.title = device.title || 'STEEL CYMBALS';

        const track = container.querySelector('.carousel-track');
        const carousel = container.querySelector('.carousel');

        let offset = 0;
        let paused = false;
        const speed = 0.4;

        function tick() {
          if (!paused) {
            offset += speed;
            const halfWidth = track.scrollWidth / 2;
            if (offset >= halfWidth) offset -= halfWidth;
            track.style.transform = `translateX(-${offset}px)`;
          }
          requestAnimationFrame(tick);
        }

        carousel.addEventListener('mouseenter', () => paused = true);
        carousel.addEventListener('mouseleave', () => paused = false);

        requestAnimationFrame(tick);
      });
  </script>

  <div id="globalNav"></div>
  <script>
    fetch('components/nav.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('globalNav').innerHTML = html;
        const navScript = document.createElement('script');
        navScript.src = 'components/nav.js';
        document.body.appendChild(navScript);
      });
  </script>

</body>

</html>
