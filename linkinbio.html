<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link In Bio</title>
    <link rel="icon" href="assets/images/logos/m_favicon.ico" type="image/x-icon" />
    <style>
        :root {
            --color-bg: #6c8670;
            --color-main: #e4f1e4;
            --color-accent: #80d4d6;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-main);
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        .grain-overlay {
            position: fixed;
            inset: 0;
            background-image: url("assets/images/misc/grain.gif");
            background-repeat: repeat;
            opacity: 0.05; 
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: soft-light;
        }


        .mobile-menu {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: fixed;
            inset: 0;
            background-color: var(--color-bg);
            padding: 24px 16px;
            text-align: center;
        }

        .mobile-menu a {
            display: block;
            padding: 10px 0;
            color: var(--color-main);
            text-decoration: none;
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .mobile-menu a:hover,
        .mobile-menu a:active {
            opacity: 0.6;
            transform: scale(0.97);
        }

        /* upcoming block */

        #upcoming-links {
            width: 100%;
            max-width: 420px;
            margin-bottom: 28px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(228, 241, 228, 0.2);
        }

        #upcoming-links a {
            display: block;
            color: var(--color-accent);
            margin: 4px 0;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            font-weight: 600;
        }

        /* small note */

        #upcoming-links p {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-bottom: 18px;
        }
    </style>
</head>

<body>
    <div class="grain-overlay"></div>
    <div class="mobile-menu visible" id="mobileMenu">
        <br />
        <div id="upcoming-links">
            <!-- Upcoming shows will appear here -->
            <p style="font-size: 0.7rem; opacity: 0.5; margin-top: -1em; margin-bottom: 0.5em;">
                Tap “•••” and “Open in browser” for best experience.
            </p>
        </div>
        <a href="https://www.maysun.zip#home">WEBSITE</a>
        <a href="https://maysunmusic.bandcamp.com/">BANDCAMP</a>
        <a href="https://www.youtube.com/@MAYSUNmusic">YOUTUBE</a>
        <a href="mailto:maysun.booking@gmail.com">CONTACT</a>
        <div style="opacity:0.4; margin: 10px 0;">⇣</div>
        <a href="https://www.maysun.zip/forever.html">FOREVER IN SOUND</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenu = document.getElementById('mobileMenu');
            const container = document.getElementById('upcoming-links');
            mobileMenu.classList.add('visible');

            fetch('data/shows.json')
                .then(response => response.json())
                .then(shows => {
                    const upcoming = shows
                        .filter(show => show.type === "upcoming")
                        .sort((a, b) => new Date(a.date) - new Date(b.date));

                    if (upcoming.length === 0) {
                        const msg = document.createElement('div');
                        msg.textContent = 'No upcoming shows.';
                        container.appendChild(msg);
                        return;
                    }

                    upcoming.forEach(show => {
                        const [year, month, day] = show.date.split('-').map(Number);
                        const dateObj = new Date(year, month - 1, day); // month is 0-based
                        const dateFormatted = dateObj.toLocaleDateString('en-US', {
                            month: 'short',
                            day: 'numeric'
                        }).toUpperCase();

                        const link = document.createElement('a');
                        link.href = show.url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        link.textContent = `${dateFormatted} @ ${show.venue}`;
                        container.appendChild(link);
                    });
                })
                .catch(error => {
                    console.error('Error fetching shows:', error);
                    const msg = document.createElement('div');
                    msg.textContent = 'Error loading shows.';
                    container.appendChild(msg);
                });
        });
    </script>
</body>

</html>
