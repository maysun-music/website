<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAYSUN</title>
    <link rel="stylesheet" href="styles/global.css">
    <script src="components/nav.js"></script>

    <style>
        .overlay-text {
            position: absolute;
            pointer-events: none;
            mix-blend-mode: multiply;
            user-select: none;
            transition: opacity 2.5s ease;
            opacity: 0;
            width: 300px;
        }

        .image-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin: 0;
            text-align: center;
            width: 100%;
            cursor: default;
        }

        .image-container img#home-image {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }

        /* reveal text */
        .reveal-text {
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            color: #555;
            margin-top: 16px;
            opacity: 0;
            transition: opacity 4.5s ease;
            pointer-events: none;
            user-select: none;
        }

        .reveal-text.visible {
            opacity: 1;
        }

        @media (max-width: 768px) {
            #home-image {
                max-height: 60vh;
                object-fit: cover;
                object-position: center top;
            }
        }
    </style>
</head>

<body>
    <script>
        fetch('components/nav.html')
            .then(res => res.text())
            .then(html => document.body.insertAdjacentHTML('afterbegin', html));
    </script>

    <div class="content-container" id="content">
        <div class="image-container" id="image-wrapper">
            <img id="home-image" src="assets/images/misc/cup_headshot.png" alt="MAYSUN - Photo by Chienn Tai">
        </div>
        <p class="reveal-text" id="reveal-text">
            This space is a living archive of sound, process, and experimentation.<br>
            Compositions, instruments, spatial systems, tools and more.<br>
            Updated 4/14/26. </p>
    </div>

    <script>
        // ── overlay effect (unchanged) ──────────────────────────────
        let overlayActive = false;
        let overlayRequestId = null;

        function addOverlayText() {
            const clone = document.createElement('img');
            clone.src = 'images/3MAYSUN_clear.png';
            clone.classList.add('overlay-text');
            clone.style.left = Math.random() * window.innerWidth + 'px';
            clone.style.top = Math.random() * window.innerHeight + 'px';
            document.body.appendChild(clone);
            requestAnimationFrame(() => { clone.style.opacity = '0'; });
            setTimeout(() => clone.remove(), 3000);
        }

        function startOverlay() {
            overlayActive = true;
            const startTime = performance.now() + 2000;
            let count = 0;
            function animate() {
                if (!overlayActive) return;
                if (performance.now() > startTime && count < 300) {
                    addOverlayText();
                    count++;
                }
                overlayRequestId = requestAnimationFrame(animate);
            }
            animate();
        }

        // ── reveal logic ────────────────────────────────────────────
        const wrapper = document.getElementById('image-wrapper');
        const text = document.getElementById('reveal-text');
        let hovered = false;
        let scrolled = false;

        function updateVisibility() {
            if (hovered || scrolled) {
                text.classList.add('visible');
            } else {
                text.classList.remove('visible');
            }
        }

        // hover (desktop)
        wrapper.addEventListener('mouseenter', () => { hovered = true; updateVisibility(); });
        wrapper.addEventListener('mouseleave', () => { hovered = false; updateVisibility(); });


        // ── init ────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            startOverlay();
            if (window.innerWidth <= 768) {
                wrapper.addEventListener('click', () => {
                    if (text.classList.contains('visible')) {
                        text.classList.remove('visible');
                    } else {
                        text.classList.add('visible');
                    }
                });
            }
        });

        window.addEventListener('hashchange', () => {
            if (window.location.hash !== '' && overlayActive) {
                overlayActive = false;
                cancelAnimationFrame(overlayRequestId);
            }
        });
    </script>
</body>

</html>
